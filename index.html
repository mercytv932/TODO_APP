<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO APP</title>
  <style>

  </style>
</head>
<body>

<form id="form">
  <input type="text" id="input">
  <button class="addTodoBtn">Add Todo</button>
</form>

<button class="filterBtn" data-filter="all">All</button>
<button class="filterBtn" data-filter="active">Active</button>
<button class="filterBtn" data-filter="completed">Completed</button>

<div id="todosContainer"></div>
<div id="statsDisplay"></div>

  <script>   
 const form = document.querySelector("#form"); 
 const input = document.querySelector("#input");
 const addTodoBtn = document.querySelector(".addTodoBtn");
 const filterBtn = document.querySelectorAll(".filterBtn");
 const todosContainer = document.querySelector("#todosContainer");
 const statsDisplay = document.querySelector("#statsDisplay");


 const STORAGE_KEY = 'todos';
 const MAX_TODO_LENGTH = 100;

function createTodo(text){

const todo = {
  id: Date.now(),
  text: text,
  completed:false,
  createdAt: new Date()
}; 
return todo;

}

function getFromStorage(key){
  const storedTodoString = localStorage.getItem(key);

  return JSON.parse(storedTodoString);
  // const TodoObject = JSON.parse(storedTodoString);
  
  // console.log(TodoObject);
}

function saveToStorage(key, value){
  const todoString = JSON.stringify(value);
  localStorage.setItem(key, todoString);
}

function sanitizeInput(sanitizeText){
const parser = new DOMParser();
const doc = parser.parseFromString(sanitizeText, 'text/html');

return doc.body.textContent || "";
}

const state = {todos: [], filter: 'all'}



function renderTodos(todos){
  todosContainer.innerHTML = "";
  const ul = document.createElement("ul");


  for(let i = 0; i < todos.length; i +=1){
    const li = document.createElement("li");

    li.textContent = `${todos[i].text}`;

    if(todos[i].completed){
      li.style.textDecoration = "line through";
    }

    li.addEventListener("click", function(){
      toggleTodo(todos[i].id);
    });
    
    ul.appendChild(li);
    
    console.log(todos[i].text, todos[i].completed);
  }
  
  todosContainer.appendChild(ul);
}

 function addTodo(){
  const inputValue = input.value.trim();
  
  if(inputValue === ""){
    alert("please enter a task.")
    return;
  }

  state.todos.push(createTodo(inputValue));
  saveToStorage(STORAGE_KEY, state.todos);
  renderTodos(state.todos);


  input.value = ""; // clear for the next todo entry.
  input.focus();
 }

 form.addEventListener("submit", function(e){
  e.preventDefault();
  addTodo();
 });

 function toggleTodo(id){
  const updatedTodos = state.todos.map((todo) =>{
    if(todo.id === id){
      return {...todo, completed: !todo.completed};
    }
    return todo;
  });

   state.todos = updatedTodos;
  saveToStorage(STORAGE_KEY, state.todos);

  console.log("toggleTodo called", id);
}


  </script>
</body>
</html>
